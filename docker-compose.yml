services:
  wordpress:
    image: wordpress:6-apache
    restart: unless-stopped
    ports:
      - "${WP_PORT:-8080}:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', '${WP_HOME:-http://localhost:8080}');
        define('WP_SITEURL', '${WP_HOME:-http://localhost:8080}');
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - wordpress_data:/var/www/html
      - ./sesna-v2:/var/www/html/wp-content/themes/sesna-v2
      - ./custom.ini:/usr/local/etc/php/conf.d/custom.ini

  db:
    image: mysql:8.0
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_RANDOM_ROOT_PASSWORD: '1'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/mysql
      # Para cargar un dump inicial, coloca init.sql en la raíz del proyecto y descomenta:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  wpcli:
    image: wordpress:cli
    restart: on-failure
    depends_on:
      - wordpress
      - db
    volumes:
      - wordpress_data:/var/www/html
      - ./sesna-v2:/var/www/html/wp-content/themes/sesna-v2
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
    command: >
      /bin/sh -c '
        until wp core is-installed --allow-root --path=/var/www/html 2>/dev/null; do
          echo "Esperando WordPress..."; sleep 3;
        done;

        if wp user get "$WP_ADMIN_USER" --allow-root --path=/var/www/html 2>/dev/null; then
          echo "El usuario $WP_ADMIN_USER ya existe, no se modifica.";
        else
          wp user create "$WP_ADMIN_USER" "$WP_ADMIN_EMAIL" \
            --role=administrator \
            --user_pass="$WP_ADMIN_PASSWORD" \
            --allow-root \
            --path=/var/www/html && echo "Usuario $WP_ADMIN_USER creado correctamente.";
        fi;

        wp theme activate sesna-v2 --allow-root --path=/var/www/html;

        wp menu location assign menu-1   principal --allow-root --path=/var/www/html;
        wp menu location assign footer-1 footer-1  --allow-root --path=/var/www/html;
        wp menu location assign footer-2 footer-2  --allow-root --path=/var/www/html;
        wp menu location assign footer-3 footer-3  --allow-root --path=/var/www/html;
      '

volumes:
  wordpress_data:
  db_data:
