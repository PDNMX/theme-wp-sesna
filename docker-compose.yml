version: "3.3"

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_RANDOM_ROOT_PASSWORD: "1"
    volumes:
      - db_data:/var/lib/mysql
      #- ./init.sql:/docker-entrypoint-initdb.d/init.sql

  wordpress:
    image: wordpress:6-apache
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "${WP_PORT:-8080}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', '${WP_HOME}');
        define('WP_SITEURL', '${WP_HOME}');
        #define('AUTOMATIC_UPDATER_DISABLED', true);
        #define('WP_AUTO_UPDATE_CORE', false);
        #define('DISALLOW_FILE_EDIT', true);
    volumes:
      - wordpress_data:/var/www/html
      - ./sesna-v2:/var/www/html/wp-content/themes/sesna-v2
      - ./custom.ini:/usr/local/etc/php/conf.d/custom.ini

  wpcli:
    image: wordpress:cli
    restart: "no"
    depends_on:
      - db
      - wordpress
    user: "33:33"
    working_dir: /var/www/html
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
      WP_HOME: ${WP_HOME}
      WP_TITLE: ${WP_TITLE}
      WP_ADMIN_USER: ${WP_ADMIN_USER}
      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
    volumes:
      - wordpress_data:/var/www/html
      - ./sesna-v2:/var/www/html/wp-content/themes/sesna-v2
    command: >
      /bin/sh -c '
      until wp db check --allow-root >/dev/null 2>&1; do
        echo "Esperando base de datos...";
        sleep 5;
      done;

      until wp core is-installed --allow-root >/dev/null 2>&1 || wp core install \
        --url="$WP_HOME" \
        --title="$WP_TITLE" \
        --admin_user="$WP_ADMIN_USER" \
        --admin_password="$WP_ADMIN_PASSWORD" \
        --admin_email="$WP_ADMIN_EMAIL" \
        --skip-email \
        --allow-root; do
        echo "Esperando instalación de WordPress...";
        sleep 5;
      done;

      wp theme activate sesna-v2 --allow-root --path=/var/www/html || true;
      wp menu location assign menu-1 principal --allow-root --path=/var/www/html;
      wp menu location assign footer-1 footer-1 --allow-root --path=/var/www/html;
      wp menu location assign footer-2 footer-2 --allow-root --path=/var/www/html;
      wp menu location assign footer-3 footer-3 --allow-root --path=/var/www/html;

      wp rewrite structure "/%postname%/" --hard --allow-root || true;
      wp rewrite flush --allow-root || true;
      '

volumes:
  db_data:
  wordpress_data:
